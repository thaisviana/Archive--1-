<text x="958.7124999999999" y="58" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Agent needs to update memory</text>
<text x="1344.7624999999998" y="489.375" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Is the block read-only?</text>
<text x="958.7124999999999" y="219.075" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Does the block exist?</text>
<text x="1505.675" y="802.575" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">What kind of edit?</text>
<text x="408.17499999999995" y="802.575" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Is this entirely new information?</text>
<text x="2056.85" y="1112.2" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Is the block obsolete?</text>
<text x="977.8625" y="802.575" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Reject — read-only blocks cannot be edited at runtime</text>
<text x="252.625" y="1112.2" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">create_memory_block — Create block with label + content</text>
<text x="975.95" y="1112.2" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">insert_memory_block — Add text at line X</text>
<text x="1346.5499999999997" y="1112.2" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">replace_memory_content — Replace string A with B</text>
<text x="1742.175" y="1112.2" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">rethink_memory_block — Rewrite the entire block</text>
<text x="2056.85" y="1293.8500000000001" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">delete_memory_block — interrupt_on, approval required</text>
<text x="641.0999999999999" y="1112.2" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">rename_memory_block — Change the label</text>
<text x="975.95" y="1293.8500000000001" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">finish_memory_edits — Signal end of batch</text>
