<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 390" width="300" height="390" style="--bg:#1a1b26;--fg:#a9b1d6;--line:#3d59a1;--accent:#7aa2f7;--muted:#565f89;background:var(--bg)">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 30%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="seq-arrow" markerWidth="8" markerHeight="4.8" refX="8" refY="2.4" orient="auto-start-reverse">
    <polygon points="0 0, 8 2.4, 0 4.8" fill="var(--_arrow)" />
  </marker>
  <marker id="seq-arrow-open" markerWidth="8" markerHeight="4.8" refX="8" refY="2.4" orient="auto-start-reverse">
    <polyline points="0 0, 8 2.4, 0 4.8" fill="none" stroke="var(--_arrow)" stroke-width="1" />
  </marker>
</defs>
<line x1="90" y1="70" x2="90" y2="360" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line x1="230" y1="70" x2="230" y2="360" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line x1="90" y1="90" x2="230" y2="90" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#seq-arrow)" />
<text x="160" y="84" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-muted)">I am not sure about X. Could you clarify?</text>
<line x1="230" y1="130" x2="90" y2="130" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#seq-arrow)" />
<text x="160" y="124" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-muted)">Partial response</text>
<line x1="90" y1="170" x2="230" y2="170" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#seq-arrow)" />
<text x="160" y="164" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-muted)">I see 2 options: A (trade-off X) vs B (trade-off Y). Which do you prefer?</text>
<line x1="230" y1="210" x2="90" y2="210" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#seq-arrow)" />
<text x="160" y="204" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-muted)">Option A</text>
<polyline points="90,250 120,250 120,270 90,270" fill="none" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#seq-arrow)" />
<text x="126" y="260" dy="0.35em" font-size="11" font-weight="400" fill="var(--_text-muted)">Execute Option A</text>
<line x1="90" y1="320" x2="230" y2="320" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#seq-arrow)" />
<text x="160" y="314" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-muted)">Done! I executed Option A. Result: [...]</text>
<rect x="30" y="74" width="120" height="27" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="0.75" />
<polygon points="144,74 150,80 144,80" fill="var(--_inner-stroke)" />
<text x="90" y="87.5" text-anchor="middle" dy="0.35em" font-size="11" font-weight="400" fill="var(--_text-muted)">Confidence &lt; 0.7</text>
<rect x="30" y="134" width="120" height="27" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="0.75" />
<polygon points="144,134 150,140 144,140" fill="var(--_inner-stroke)" />
<text x="90" y="147.5" text-anchor="middle" dy="0.35em" font-size="11" font-weight="400" fill="var(--_text-muted)">Still uncertain</text>
<rect x="30" y="214" width="120" height="27" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="0.75" />
<polygon points="144,214 150,220 144,220" fill="var(--_inner-stroke)" />
<text x="90" y="227.5" text-anchor="middle" dy="0.35em" font-size="11" font-weight="400" fill="var(--_text-muted)">Confidence &gt;= 0.9</text>
<rect x="50" y="30" width="80" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
<text x="90" y="50" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Agent</text>
<rect x="190" y="30" width="80" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
<text x="230" y="50" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">User</text>
</svg>