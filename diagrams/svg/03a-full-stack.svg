<text x="310.375" y="1306" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">8. save_to_graph — @after_model: graphiti.add_episode</text>
<text x="310.375" y="1462" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">9. rethink_memory — @after_model: conditional block updates</text>
