<text x="229.72500000000002" y="258" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Documents: PDF, DOCX, MD, TXT, CSV, HTML...</text>
<text x="1402.275" y="258" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">PostgreSQL + pgvector | Namespace: kb_docs | Hybrid Search Config</text>
<text x="776.6750000000001" y="106" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">1. SimpleDirectoryReader — Load documents</text>
<text x="776.675" y="182" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">2. SentenceSplitter — 512 tokens, 50 overlap</text>
<text x="776.6750000000001" y="258" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">3. Context Generation — LLM generates context per chunk</text>
<text x="776.6750000000001" y="334" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">4. Prepend Context — Add context to the beginning of each chunk</text>
<text x="776.6750000000001" y="410" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">5. Embedding Model — text-embedding-3-small (1536 dims)</text>
