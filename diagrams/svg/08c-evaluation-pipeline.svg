<text x="1922.8500000000004" y="54" dy="0.35em" font-size="12" font-weight="600" fill="var(--_text-sec)">Scores</text>
<polyline points="385.15000000000003,116 1600.1,116" fill="none" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#arrowhead)" />
