<text x="2577.9" y="146" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">LangFuse Dashboard — Aggregated metrics per session/period</text>
<text x="222.57500000000002" y="116" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Complete trace (input + output + context)</text>
<text x="2082.7000000000003" y="116" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Score: 0.0 - 1.0</text>
<text x="2082.7000000000003" y="176" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">User Feedback: thumbs up / thumbs down</text>
<text x="712.325" y="116" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Relevance — Does the answer address the question?</text>
<text x="1154.425" y="116" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Faithfulness — Is the answer grounded in retrieved context?</text>
<text x="1600.1" y="116" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Helpfulness — Was the response useful to the user?</text>
</svg>