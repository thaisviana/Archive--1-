<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1635.285 430" width="1635.285" height="430" style="--bg:#1a1b26;--fg:#a9b1d6;--line:#3d59a1;--accent:#7aa2f7;--muted:#565f89;background:var(--bg)">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 30%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="seq-arrow" markerWidth="8" markerHeight="4.8" refX="8" refY="2.4" orient="auto-start-reverse">
    <polygon points="0 0, 8 2.4, 0 4.8" fill="var(--_arrow)" />
  </marker>
  <marker id="seq-arrow-open" markerWidth="8" markerHeight="4.8" refX="8" refY="2.4" orient="auto-start-reverse">
    <polyline points="0 0, 8 2.4, 0 4.8" fill="none" stroke="var(--_arrow)" stroke-width="1" />
  </marker>
</defs>
<line x1="70" y1="70" x2="70" y2="400" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line x1="269.675" y1="70" x2="269.675" y2="400" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line x1="570.475" y1="70" x2="570.475" y2="400" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line x1="849.825" y1="70" x2="849.825" y2="400" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line x1="1104.15" y1="70" x2="1104.15" y2="400" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line x1="1379.9250000000002" y1="70" x2="1379.9250000000002" y2="400" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line x1="70" y1="90" x2="269.675" y2="90" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#seq-arrow)" />
<text x="169.8375" y="84" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-muted)">user message</text>
<line x1="269.675" y1="130" x2="570.475" y2="130" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#seq-arrow)" />
<text x="420.07500000000005" y="124" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-muted)">state with hybrid memory layout</text>
<line x1="570.475" y1="170" x2="849.825" y2="170" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#seq-arrow)" />
<text x="710.1500000000001" y="164" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-muted)">state (compressed if needed)</text>
<polyline points="849.825,210 879.825,210 879.825,230 849.825,230" fill="none" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#seq-arrow)" />
<text x="885.825" y="220" dy="0.35em" font-size="11" font-weight="400" fill="var(--_text-muted)">LLM + tools</text>
<line x1="849.825" y1="280" x2="1104.15" y2="280" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
<text x="976.9875000000001" y="274" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-muted)">response + updated state</text>
<line x1="1104.15" y1="320" x2="1379.9250000000002" y2="320" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#seq-arrow)" />
<text x="1242.0375000000001" y="314" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-muted)">state + just_summarized flag</text>
<line x1="1379.9250000000002" y1="360" x2="70" y2="360" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
<text x="724.9625000000001" y="354" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-muted)">response</text>
<rect x="32.875" y="94" width="473.6" height="27" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="0.75" />
<polygon points="500.475,94 506.475,100 500.475,100" fill="var(--_inner-stroke)" />
<text x="269.675" y="107.5" text-anchor="middle" dy="0.35em" font-size="11" font-weight="400" fill="var(--_text-muted)">Static blocks already in system prompt — inject dynamic blocks into user message</text>
<rect x="408.035" y="134" width="324.88" height="27" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="0.75" />
<polygon points="726.915,134 732.915,140 726.915,140" fill="var(--_inner-stroke)" />
<text x="570.475" y="147.5" text-anchor="middle" dy="0.35em" font-size="11" font-weight="400" fill="var(--_text-muted)">If tokens &gt; 8000, summarize + set just_summarized flag</text>
<rect x="1033.23" y="284" width="141.84" height="27" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="0.75" />
<polygon points="1169.07,284 1175.07,290 1169.07,290" fill="var(--_inner-stroke)" />
<text x="1104.15" y="297.5" text-anchor="middle" dy="0.35em" font-size="11" font-weight="400" fill="var(--_text-muted)">graphiti.add_episode()</text>
<rect x="1154.565" y="324" width="450.72" height="27" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="0.75" />
<polygon points="1599.285,324 1605.285,330 1599.285,330" fill="var(--_inner-stroke)" />
<text x="1379.9250000000002" y="337.5" text-anchor="middle" dy="0.35em" font-size="11" font-weight="400" fill="var(--_text-muted)">Conditional: run if dynamic tokens &gt; 70% limit OR N turns since last rethink</text>
<rect x="30" y="30" width="80" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
<text x="70" y="50" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">User</text>
<rect x="150" y="30" width="239.35000000000002" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
<text x="269.675" y="50" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">inject_memory (@before_model)</text>
<rect x="429.35" y="30" width="282.25" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
<text x="570.475" y="50" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">summarize_if_needed (@before_model)</text>
<rect x="751.6" y="30" width="196.45000000000002" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
<text x="849.825" y="50" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Agent Core + Compaction</text>
<rect x="988.0500000000001" y="30" width="232.20000000000002" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
<text x="1104.15" y="50" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">save_to_graph (@after_model)</text>
<rect x="1260.2500000000002" y="30" width="239.35000000000002" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
<text x="1379.9250000000002" y="50" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">rethink_memory (@after_model)</text>
</svg>