<text x="283.5375" y="164" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-muted)">read_only=false, char_limit=2000</text>
<line x1="210" y1="210" x2="507.725" y2="210" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#seq-arrow)" />
<text x="358.8625" y="204" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-muted)">INSERT snapshot of current content</text>
<line x1="210" y1="250" x2="357.075" y2="250" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#seq-arrow)" />
