<text x="437.76250000000005" y="352" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-muted)">offload overflow to /memory/overflow/preferences</text>
<line x1="210" y1="398" x2="357.075" y2="398" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#seq-arrow)" />
<text x="283.5375" y="392" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-muted)">UPDATE content = truncated to char_limit</text>
<line x1="210" y1="438" x2="70" y2="438" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
<text x="140" y="432" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-muted)">Block preferences updated</text>
<rect x="139.07999999999998" y="174" width="141.84" height="27" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="0.75" />
<polygon points="274.91999999999996,174 280.91999999999996,180 274.91999999999996,180" fill="var(--_inner-stroke)" />
<text x="210" y="187.5" text-anchor="middle" dy="0.35em" font-size="11" font-weight="400" fill="var(--_text-muted)">read_only check passed</text>
<rect x="30" y="30" width="80" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
<text x="70" y="50" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Agent</text>
<rect x="154.675" y="30" width="110.65" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
<text x="210" y="50" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Memory Tool</text>
<rect x="305.325" y="30" width="103.5" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
<text x="357.075" y="50" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">PostgreSQL</text>
<rect x="448.82500000000005" y="30" width="117.80000000000001" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
<text x="507.725" y="50" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">BlockHistory</text>
<rect x="606.6250000000001" y="30" width="117.80000000000001" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
<text x="665.5250000000001" y="50" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">StoreBackend</text>
</svg>