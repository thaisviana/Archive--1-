<line x1="665.5250000000001" y1="70" x2="665.5250000000001" y2="478" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line x1="70" y1="90" x2="210" y2="90" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#seq-arrow)" />
<text x="140" y="84" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-muted)">rethink_memory_block(preferences, new_content)</text>
<line x1="210" y1="130" x2="357.075" y2="130" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#seq-arrow)" />
<text x="283.5375" y="124" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-muted)">SELECT read_only, char_limit FROM memory_blocks WHERE label=preferences</text>
